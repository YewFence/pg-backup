name: pg-backup-smoke

services:
  postgres:
    build:
      context: ../pg
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      BARMAN_PASSWORD: barman
      STREAMING_BARMAN_PASSWORD: streaming_barman
      S3_BUCKET_URL: ""
    volumes:
      - ../pg/initdb:/docker-entrypoint-initdb.d:ro
      - ../pg/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
      - ../pg/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - wal-archive:/archive
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 3s
      retries: 30

  barman:
    build:
      context: ../barman
    init: true
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      HEALTH_CHECK_PORT: 8000
      CHECK_INTERVAL: 30
      FAIL_THRESHOLD: 1
    volumes:
      - barman-data:/var/lib/barman
      - ./config:/etc/barman.d:ro

volumes:
  barman-data:
  wal-archive:
