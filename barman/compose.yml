services:
  tailscale:
    image: tailscale/tailscale:latest
    container_name: barman-tailscale
    hostname: barman
    restart: unless-stopped
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
    volumes:
      - tailscale-state:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - SYS_MODULE
      - NET_ADMIN
    networks:
      - barman-net

  barman:
    build: .
    container_name: barman
    init: true
    restart: unless-stopped
    network_mode: "service:tailscale"
    depends_on:
      - tailscale
    environment:
      PG_HOST: ${PG_HOST:-postgres}
      BARMAN_PASSWORD: ${BARMAN_PASSWORD:-}
      STREAMING_BARMAN_PASSWORD: ${STREAMING_BARMAN_PASSWORD:-}
      HEALTH_CHECK_PORT: ${HEALTH_CHECK_PORT:-8000}
      CHECK_INTERVAL: ${CHECK_INTERVAL:-300}
      FAIL_THRESHOLD: ${FAIL_THRESHOLD:-3}
    volumes:
      - barman-data:/var/lib/barman
      - ./config:/etc/barman.d

  # 一次性恢复服务，避免常驻 barman 容器长期占用恢复卷
  barman-restore:
    build: .
    profiles: ["recovery"]
    init: true
    network_mode: "service:tailscale"
    depends_on:
      - tailscale
    environment:
      PG_HOST: ${PG_HOST:-postgres}
      BARMAN_PASSWORD: ${BARMAN_PASSWORD:-}
      STREAMING_BARMAN_PASSWORD: ${STREAMING_BARMAN_PASSWORD:-}
    volumes:
      - barman-data:/var/lib/barman
      - barman-recover:/recover
      - ./config:/etc/barman.d
    entrypoint: ["/usr/local/bin/setup-pgpass.sh"]
    command: ["barman", "--help"]

  # Barman 本地恢复出的文件属于 barman 用户，启动 Postgres 前先修复成 postgres 权限
  fix-recover-permissions:
    image: postgres:17
    container_name: barman-fix-recover-permissions
    profiles: ["recovery"]
    user: root
    command:
      - bash
      - -ec
      - |
        if [ -d /recover/base ]; then
          chmod 700 /recover/base
        fi
        chown -R postgres:postgres /recover
        find /recover -type d -exec chmod 700 {} +
    volumes:
      - barman-recover:/recover
    networks:
      - barman-net

  # 恢复验证用 PG，平时不启动
  pg-recovered:
    image: postgres:17
    container_name: pg-recovered
    profiles: ["recovery"]
    init: true
    ports:
      - "5433:5432"
    volumes:
      - barman-recover:/var/lib/postgresql/data
      - barman-recover:/recover:ro
    networks:
      - barman-net

networks:
  barman-net:
    driver: bridge

volumes:
  tailscale-state:
  barman-data:
  barman-recover:
