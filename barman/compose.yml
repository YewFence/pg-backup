services:
    tailscale:
        image: tailscale/tailscale:latest
        container_name: barman-tailscale
        hostname: barman
        restart: unless-stopped
        environment:
            - TS_AUTHKEY=${TS_AUTHKEY}
            - TS_STATE_DIR=/var/lib/tailscale
            - TS_USERSPACE=false
        volumes:
            - tailscale-state:/var/lib/tailscale
            - /dev/net/tun:/dev/net/tun
        cap_add:
            - NET_ADMIN
            - SYS_MODULE
        networks:
            - barman-net

    barman:
        build: .
        container_name: barman
        init: true
        restart: unless-stopped
        network_mode: "service:tailscale"
        depends_on:
            - tailscale
        environment:
            - PG_HOST=${PG_HOST}
            - BARMAN_PASSWORD=${BARMAN_PASSWORD}
            - STREAMING_BARMAN_PASSWORD=${STREAMING_BARMAN_PASSWORD}
        volumes:
            - barman-data:/var/lib/barman
            - ./recover:/recover
            - ./config:/etc/barman.d

    # 恢复验证用 PG，平时不启动
    pg-recovered:
        image: postgres:17
        container_name: pg-recovered
        profiles: ["recovery"]
        ports:
            - "5433:5432"
        volumes:
            - ./recover:/var/lib/postgresql/data
        networks:
            - barman-net

networks:
    barman-net:
        driver: bridge

volumes:
    tailscale-state:
    barman-data:
