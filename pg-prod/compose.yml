services:
  archive-init:
    image: postgres:18
    user: root
    network_mode: none
    command:
      - bash
      - -lc
      - mkdir -p /archive && chown -R postgres:postgres /archive && chmod 700 /archive
    volumes:
      - wal-archive:/archive
    restart: "no"

  postgres:
    image: postgres:18
    container_name: postgres
    restart: unless-stopped
    depends_on:
      archive-init:
        condition: service_completed_successfully
    env_file: .env
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres
    ports:
      - 127.0.0.1:5432:5432
      # 映射到当前宿主机 Tailscale IP，自行更改
      # - 100.0.0.1:5432:5432
    healthcheck:
      test: ["CMD-SHELL", "gosu postgres pg_isready -U postgres"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    volumes:
      # 数据目录
      - pg-data:/var/lib/postgresql/data
      # 自动初始化，创建 Barman 用户并写入配置
      - ./initdb:/docker-entrypoint-initdb.d
      # 初始化配置源，首次启动时复制到 PGDATA，便于随数据目录备份
      - ./pg_hba.conf:/config/pg_hba.conf:ro
      - ./conf.d:/config/conf.d:ro
      # WAL 归档共享卷
      - wal-archive:/archive
    networks:
      - pg-net
    # # 资源限制 — 小机器上按需取消注释
    # deploy:
    #   resources:
    #     limits:
    #       cpus: "2"
    #       memory: 2G
    #     reservations:
    #       cpus: "0.5"
    #       memory: 512M

  barman-cloud:
    build:
      context: .
      dockerfile: Dockerfile.cloud
    container_name: barman-cloud
    restart: unless-stopped
    init: true
    profiles: ["cloud"]
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      PG_HOST: postgres
      PG_USER: barman
    volumes:
      - wal-archive:/archive
    networks:
      - pg-net

  pg-recovery:
    build:
      context: .
      dockerfile: Dockerfile.recovery
    container_name: pg-recovery
    profiles: ["recovery"]
    env_file: .env
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres
      # RECOVERY_TARGET_TIME: "2026-01-01 00:00:00+00"  # 可选：PITR 目标时间
      # AUTO_SHUTDOWN_AFTER_RECOVERY: "true"             # 可选：恢复完成后自动关闭
      # RECOVERY_VERIFY_QUERY: "SELECT count(*) FROM your_table;"  # 可选：自定义验证查询
    ports:
      - "5433:5432"
    volumes:
      - pg-recovery-data:/var/lib/postgresql/data
    networks:
      - pg-net

volumes:
  pg-data:
  pg-recovery-data:
  wal-archive:

networks:
  pg-net:
    name: pg-net
    driver: bridge
