services:
  postgres:
    image: postgres:17
    container_name: postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres
    ports:
      - 127.0.0.1:5432:5432
      # 映射到当前宿主机 Tailscale IP，自行更改
      # - 100.0.0.1:5432:5432
    healthcheck:
      test: ["CMD-SHELL", "gosu postgres pg_isready -U postgres"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    volumes:
      # 数据目录
      - ./pgdata:/var/lib/postgresql/data
      # 自动初始化，创建 Barman 用户
      - ./initdb:/docker-entrypoint-initdb.d
      # Barman 相关配置（挂载到临时位置，由 initdb 脚本复制到 pgdata）
      - ./pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
      - ./postgresql.conf:/etc/postgresql/postgresql.conf:ro
      # WAL 归档共享卷
      - wal-archive:/archive
    networks:
      - pg-net
    # # 资源限制 — 小机器上按需取消注释
    # deploy:
    #   resources:
    #     limits:
    #       cpus: "2"
    #       memory: 2G
    #     reservations:
    #       cpus: "0.5"
    #       memory: 512M

  barman-cloud:
    build:
      context: .
      dockerfile: Dockerfile.cloud
    container_name: barman-cloud
    restart: unless-stopped
    init: true
    profiles: ["cloud"]
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      PG_HOST: postgres
      PG_USER: barman
    volumes:
      - wal-archive:/archive
      - ./pgdata:/var/lib/postgresql/data:ro
    networks:
      - pg-net

  pg-recovery:
    build:
      context: .
      dockerfile: Dockerfile.recovery
    container_name: pg-recovery
    profiles: ["recovery"]
    env_file: .env
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres
      # RECOVERY_TARGET_TIME: "2026-01-01 00:00:00+00"  # 可选：PITR 目标时间
      # AUTO_SHUTDOWN_AFTER_RECOVERY: "true"             # 可选：恢复完成后自动关闭
      # RECOVERY_VERIFY_QUERY: "SELECT count(*) FROM your_table;"  # 可选：自定义验证查询
    ports:
      - "5433:5432"
    volumes:
      - ./pgdata-recovery:/var/lib/postgresql/data
    networks:
      - pg-net

volumes:
  wal-archive:

networks:
  pg-net:
    name: pg-net
    driver: bridge
