# =============================================================================
# PostgreSQL 17 生产配置 (pg-prod)
# 默认值按 4GB 内存调优，可用 tune.sh 切换到 2/4/8/16GB 档位
# =============================================================================

# -----------------------------------------------------------------------------
# 连接
# -----------------------------------------------------------------------------
listen_addresses = '*'
max_connections = 100

# -----------------------------------------------------------------------------
# 内存 (4GB 档位，tune.sh 可调整)
# -----------------------------------------------------------------------------
shared_buffers = 1GB
effective_cache_size = 3GB
work_mem = 10MB
maintenance_work_mem = 256MB

# -----------------------------------------------------------------------------
# 存储 (SSD 优化，HDD 场景用 reset-ssd.sh 恢复默认)
# -----------------------------------------------------------------------------
random_page_cost = 1.1              # 默认 4，SSD 推荐 1.1
effective_io_concurrency = 200      # 默认 1，SSD 推荐 200

# -----------------------------------------------------------------------------
# WAL / 归档
# -----------------------------------------------------------------------------
wal_level = replica
archive_mode = on
archive_command = 'test -n "$S3_BUCKET_URL" && test ! -f /archive/%f && cp %p /archive/%f || /bin/true'
archive_timeout = 900

max_wal_size = 1GB                  # tune.sh 可调整
min_wal_size = 80MB

# -----------------------------------------------------------------------------
# 复制
# -----------------------------------------------------------------------------
wal_keep_size = 4096            # MB, 保留更多 WAL 避免 barman 落后时丢段
max_slot_wal_keep_size = 5GB    # 默认 5GB，可用 configure-slot-wal-keep.sh 调整

# -----------------------------------------------------------------------------
# 日志
# -----------------------------------------------------------------------------
logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d.log'
log_min_duration_statement = 1000       # 记录 >1s 慢查询
log_line_prefix = '%m [%p] %u@%d '      # 时间 PID 用户@库
log_checkpoints = on
log_connections = on
log_disconnections = on
log_timezone = 'Etc/UTC'

# -----------------------------------------------------------------------------
# 区域 / 时间
# -----------------------------------------------------------------------------
datestyle = 'iso, mdy'
timezone = 'Etc/UTC'
lc_messages = 'en_US.utf8'
lc_monetary = 'en_US.utf8'
lc_numeric = 'en_US.utf8'
lc_time = 'en_US.utf8'
default_text_search_config = 'pg_catalog.english'
