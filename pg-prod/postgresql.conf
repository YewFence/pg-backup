# =============================================================================
# PostgreSQL 17 生产配置 (pg-prod)
# 默认值按 4GB 内存调优，可用 tune.sh 切换到 2/4/8/16GB 档位
# =============================================================================

# -----------------------------------------------------------------------------
# 连接
# -----------------------------------------------------------------------------
listen_addresses = '*'
max_connections = 100

# -----------------------------------------------------------------------------
# 内存 (4GB 档位，tune.sh 可调整)
# -----------------------------------------------------------------------------
shared_buffers = 1GB
effective_cache_size = 3GB
work_mem = 10MB
maintenance_work_mem = 256MB

# -----------------------------------------------------------------------------
# WAL / 归档
# -----------------------------------------------------------------------------
wal_level = replica
archive_mode = on
archive_command = '/bin/true'
archive_timeout = 900

max_wal_size = 1GB
min_wal_size = 80MB

# -----------------------------------------------------------------------------
# 复制
# -----------------------------------------------------------------------------
wal_keep_size = 4096            # MB, 保留更多 WAL 避免 barman 落后时丢段
max_slot_wal_keep_size = -1     # 不限制 slot 保留量 (-1 = 禁用)

# -----------------------------------------------------------------------------
# 日志
# -----------------------------------------------------------------------------
logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d.log'
log_min_duration_statement = 1000       # 记录 >1s 慢查询
log_line_prefix = '%m [%p] %u@%d '      # 时间 PID 用户@库
log_checkpoints = on
log_connections = on
log_disconnections = on
log_timezone = 'Etc/UTC'

# -----------------------------------------------------------------------------
# 区域 / 时间
# -----------------------------------------------------------------------------
datestyle = 'iso, mdy'
timezone = 'Etc/UTC'
lc_messages = 'en_US.utf8'
lc_monetary = 'en_US.utf8'
lc_numeric = 'en_US.utf8'
lc_time = 'en_US.utf8'
default_text_search_config = 'pg_catalog.english'
